name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install buildozer cython==0.29.36
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          autoconf libtool pkg-config \
          libncurses-dev \
          cmake libffi-dev libssl-dev \
          openjdk-17-jdk unzip wget
        sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
    
    - name: Pre-download Android SDK with licenses accepted
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        # buildozer 会把 SDK 下载到这里
        SDK_DIR=~/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_DIR
        # 下载旧版 SDK tools（buildozer 期望的 tools/bin/sdkmanager 结构）
        wget -q https://dl.google.com/android/repository/tools_r25.2.3-linux.zip -O /tmp/sdk-tools.zip
        unzip -q /tmp/sdk-tools.zip -d $SDK_DIR
        # 预先创建许可证文件
        mkdir -p $SDK_DIR/licenses
        printf "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > $SDK_DIR/licenses/android-sdk-license
        printf "\n84831b9409646a918e30573bab4c9c91346d8abd\n" > $SDK_DIR/licenses/android-sdk-preview-license
        # 验证 sdkmanager 可用
        echo "sdkmanager path:"
        ls -la $SDK_DIR/tools/bin/sdkmanager
        # 接受所有许可证
        yes | $SDK_DIR/tools/bin/sdkmanager --licenses > /dev/null || true
        # 预装 build-tools、platform-tools、platforms
        $SDK_DIR/tools/bin/sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-33"
        echo "SDK setup done. Contents:"
        ls -la $SDK_DIR/
    
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NOTAI-apk
        path: bin/*.apk
        retention-days: 30
