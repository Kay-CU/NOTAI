name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install buildozer==1.5.0 cython==0.29.36
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          autoconf libtool pkg-config \
          libncurses-dev \
          cmake libffi-dev libssl-dev \
          openjdk-17-jdk unzip wget
        sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
    
    - name: Pre-install Android SDK (Java 17 compatible)
      run: |
        # 新版 commandline-tools 支持 Java 17
        # buildozer 只认 tools/bin/sdkmanager，所以解压后重命名为 tools
        SDK_DIR=/home/runner/.buildozer/android/platform/android-sdk
        mkdir -p $SDK_DIR
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/
        mv /tmp/cmdline-tools $SDK_DIR/tools
        # 预创建 licenses
        mkdir -p $SDK_DIR/licenses
        printf "8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee\n" > $SDK_DIR/licenses/android-sdk-license
        printf "84831b9409646a918e30573bab4c9c91346d8abd\n" > $SDK_DIR/licenses/android-sdk-preview-license
        # 预装 build-tools 和 platform-tools，避免 buildozer 运行时安装卡住
        export ANDROID_HOME=$SDK_DIR
        export ANDROID_SDK_ROOT=$SDK_DIR
        yes | $SDK_DIR/tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        $SDK_DIR/tools/bin/sdkmanager "build-tools;34.0.0" "platform-tools" "platforms;android-33" > /tmp/sdk_install.log 2>&1 || true
        echo "=== sdkmanager install log ==="
        tail -20 /tmp/sdk_install.log || true
        # 验证
        ls -la $SDK_DIR/tools/bin/sdkmanager
        $SDK_DIR/tools/bin/sdkmanager --version
        echo "SDK installed at $SDK_DIR"
        ls -la $SDK_DIR/build-tools/ 2>/dev/null || true
    
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk
        script -q -c "buildozer android debug" /dev/null 2>&1 | tee buildozer.log
      timeout-minutes: 60
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 5
    
    - name: Find APK
      id: find_apk
      run: |
        echo "=== bin directory ==="
        ls -la bin/ 2>/dev/null || echo "no bin"
        echo "=== Find all APKs ==="
        find . -name "*.apk" -type f 2>/dev/null
        APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: No APK found"
          exit 1
        fi
        echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK at: $APK_PATH"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NOTAI-apk
        path: ${{ steps.find_apk.outputs.APK_PATH }}
        retention-days: 30
