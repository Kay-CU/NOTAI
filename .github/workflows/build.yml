name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build APK with Docker
      run: |
        docker run --rm -v "$(pwd)":/home/user/hostcwd kivy/buildozer:stable /bin/bash -c "
          cd /home/user/hostcwd && \
          yes | /usr/local/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true && \
          buildozer android debug
        " 2>&1 | tee buildozer.log
    
    - name: Upload build log
      uses: actions/upload-artifact@v4
      with:
        name: buildozer-log
        path: buildozer.log
        retention-days: 5
    
    - name: Find APK
      id: find_apk
      run: |
        echo "=== bin directory ==="
        ls -la bin/ 2>/dev/null || echo "no bin"
        echo "=== Find all APKs ==="
        find . -name "*.apk" -type f 2>/dev/null
        APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: No APK found"
          exit 1
        fi
        echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK at: $APK_PATH"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NOTAI-apk
        path: ${{ steps.find_apk.outputs.APK_PATH }}
        retention-days: 30
