name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install buildozer cython==0.29.36
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          autoconf libtool pkg-config \
          libncurses-dev \
          cmake libffi-dev libssl-dev \
          openjdk-17-jdk
        sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platform-tools build-tools;34.0.0 platforms;android-33'
    
    - name: Link Android SDK to buildozer expected path
      run: |
        # buildozer 期望 SDK 在 ~/.buildozer/android/platform/android-sdk
        # 并且需要 tools/bin/sdkmanager 结构
        BZ_SDK=/home/runner/.buildozer/android/platform/android-sdk
        mkdir -p /home/runner/.buildozer/android/platform
        # 把 setup-android 安装的 SDK 链接过去
        ln -sf $ANDROID_HOME $BZ_SDK
        # 创建 buildozer 期望的 tools/bin/sdkmanager（指向 cmdline-tools）
        mkdir -p $BZ_SDK/tools/bin
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $BZ_SDK/tools/bin/sdkmanager
        ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager $BZ_SDK/tools/bin/avdmanager
        # 复制许可证文件
        cp -r $ANDROID_HOME/licenses $BZ_SDK/ 2>/dev/null || true
        echo "SDK linked. Verifying:"
        ls -la $BZ_SDK/tools/bin/sdkmanager
        $BZ_SDK/tools/bin/sdkmanager --version
    
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
    
    - name: Build APK
      run: |
        export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
        export PATH=$JAVA_HOME/bin:$PATH
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NOTAI-apk
        path: bin/*.apk
        retention-days: 30
