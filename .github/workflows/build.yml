name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Build APK with Buildozer
      uses: mvidner/kivy-buildozer-action@master
      with:
        command: buildozer android debug
        buildozer-version: 1.5.0
    
    - name: Find APK
      id: find_apk
      run: |
        echo "=== bin directory ==="
        ls -la bin/ 2>/dev/null || echo "no bin"
        echo "=== .buildozer android app ==="
        ls -la .buildozer/android/app/ 2>/dev/null || echo "no app dir"
        echo "=== Find all APKs ==="
        find . -name "*.apk" -type f 2>/dev/null
        APK_PATH=$(find . -name "*.apk" -type f 2>/dev/null | head -1)
        echo "APK_PATH=$APK_PATH" >> $GITHUB_OUTPUT
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NOTAI-apk
        path: ${{ steps.find_apk.outputs.APK_PATH }}
        retention-days: 30
